seed: 42

data:
  train_dir: data/train
  val_dir: data/val
  test_dir: data/test
  image_size: 224
  batch_size: 32
  num_workers: 2

model:
  name: resnet18
  num_classes: 6
  pretrained: true

training:
  epochs: 10
  learning_rate: 0.0001
  weight_decay: 0.0001

outputs:
  checkpoint_path: outputs/best_resnet18.pt
  confusion_matrix_path: outputs/confusion_matrix.png
